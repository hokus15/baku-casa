name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            path: backend
          - name: bot
            path: bot
    name: ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ${{ matrix.path }}/pyproject.toml

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" || python -m pip install -e .

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: pytest
