name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            path: backend
          - name: bot
            path: bot
    name: ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ${{ matrix.path }}/pyproject.toml

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" || python -m pip install -e .

      - name: Verify migrations (backend only)
        if: matrix.name == 'backend'
        working-directory: ${{ matrix.path }}
        run: python -m alembic -c alembic.ini upgrade head

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: pytest

  cross-root-imports:
    runs-on: ubuntu-latest
    name: Cross-root import gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check no backend→bot cross-root imports
        run: |
          if grep -r 'from baku\.bot' backend/src/ backend/tests/ 2>/dev/null; then
            echo "ERROR: backend imports from baku.bot (ADR-0001 violation)"
            exit 1
          fi
          echo "OK: no backend→bot cross-root imports"

      - name: Check no bot→backend cross-root imports
        run: |
          if grep -r 'from baku\.backend' bot/src/ bot/tests/ 2>/dev/null; then
            echo "ERROR: bot imports from baku.backend (ADR-0001 violation)"
            exit 1
          fi
          echo "OK: no bot→backend cross-root imports"
