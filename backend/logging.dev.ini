[loggers]
keys=root

[handlers]
keys=json_file,human_file

[formatters]
keys=json_fmt,human_fmt

[logger_root]
level=INFO
handlers=json_file,human_file

[handler_json_file]
class=baku.backend.infrastructure.logging.handlers.MadridTimedRotatingFileHandler
level=INFO
formatter=json_fmt
args=('logs/backend.dev.json.log','midnight',1,7,'utf-8')

[handler_human_file]
class=baku.backend.infrastructure.logging.handlers.MadridTimedRotatingFileHandler
level=INFO
formatter=human_fmt
args=('logs/backend.dev.human.log','midnight',1,7,'utf-8')

[formatter_json_fmt]
class=baku.backend.infrastructure.logging.formatters.JsonLogFormatter

[formatter_human_fmt]
format=%(asctime)s %(levelname)s %(service_name)s correlation_id=%(correlation_id)s %(message)s
datefmt=%Y-%m-%dT%H:%M:%S
